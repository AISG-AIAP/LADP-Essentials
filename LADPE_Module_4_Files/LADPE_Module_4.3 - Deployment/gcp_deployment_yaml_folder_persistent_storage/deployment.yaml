# deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flowise
  labels:
    app: flowise
spec:
  selector:
    matchLabels:
      app: flowise
  replicas: 1
  template:
    metadata:
      labels:
        app: flowise
    spec:
      initContainers: # runs before main container to prepare the PVC volume
      - name: init-permissions
        image: busybox
        command: ['sh', '-c', 'mkdir -p /root/.flowise/logs /root/.flowise/storage && chmod -R 777 /root/.flowise'] # PVC mounts as empty dir with restrictive permissions; pre-create subdirs and open permissions so Flowise can write
        volumeMounts:
        - name: flowise-storage
          mountPath: /root/.flowise
      containers:
      - name: flowise
        image: gcr.io/[ProjectID]/flowise:dev ########add project ID here #######
        imagePullPolicy: Always
        securityContext: # ensures the container runs as root so it has write access to the PVC-mounted volume
          runAsUser: 0 # run as root user
          runAsGroup: 0 # run as root group
        ########add env variables below for persistent volume mounting #######
        env:
        - name: DATABASE_PATH
          value: /root/.flowise
        - name: SECRETKEY_PATH
          value: /root/.flowise
        - name: LOG_PATH
          value: /root/.flowise/logs
        - name: BLOB_STORAGE_PATH
          value: /root/.flowise/storage
        volumeMounts:
        - name: flowise-storage
          mountPath: /root/.flowise
        ########add env variables above for persistent volume mounting #######
        resources:
          requests:
            cpu: "1"
            memory: "1Gi"
      ########add volume mounts below for persistent volume mounting #######
      volumes:
      - name: flowise-storage
        persistentVolumeClaim:
          claimName: flowise-pvc
      ########add volume mounts above for persistent volume mounting #######